<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- D logo mark -->
  <rect x="80" y="80" width="56" height="56" rx="14" fill="#06b6d4"/>
  <text x="108" y="122" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle">D</text>
  <!-- Name -->
  <text x="80" y="300" font-family="system-ui, sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="-3">Dennis</text>
  <text x="80" y="385" font-family="system-ui, sans-serif" font-size="72" font-weight="700" fill="#06b6d4" letter-spacing="-3">Opoku Asiedu</text>
  <!-- Tagline -->
  <text x="80" y="455" font-family="system-ui, sans-serif" font-size="28" fill="rgba(255,255,255,0.5)" letter-spacing="0">I build products, brands and experiences.</text>
  <!-- Discipline pills -->
  <g>
    <rect x="80" y="500" width="160" height="36" rx="18" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
    <text x="160" y="523" font-family="system-ui, sans-serif" font-size="13" fill="#6366f1" text-anchor="middle" font-weight="600">Engineering</text>
    <rect x="254" y="500" width="100" height="36" rx="18" fill="rgba(139,92,246,0.2)" stroke="rgba(139,92,246,0.4)" stroke-width="1"/>
    <text x="304" y="523" font-family="system-ui, sans-serif" font-size="13" fill="#8b5cf6" text-anchor="middle" font-weight="600">AI</text>
    <rect x="368" y="500" width="140" height="36" rx="18" fill="rgba(245,158,11,0.2)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
    <text x="438" y="523" font-family="system-ui, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle" font-weight="600">Creative</text>
    <rect x="522" y="500" width="130" height="36" rx="18" fill="rgba(16,185,129,0.2)" stroke="rgba(16,185,129,0.4)" stroke-width="1"/>
    <text x="587" y="523" font-family="system-ui, sans-serif" font-size="13" fill="#10b981" text-anchor="middle" font-weight="600">Ventures</text>
  </g>
  <!-- Right decoration -->
  <circle cx="980" cy="315" r="180" fill="none" stroke="rgba(6,182,212,0.12)" stroke-width="1"/>
  <circle cx="980" cy="315" r="130" fill="none" stroke="rgba(6,182,212,0.08)" stroke-width="1"/>
  <circle cx="980" cy="315" r="80" fill="rgba(6,182,212,0.06)"/>
  <circle cx="980" cy="315" r="30" fill="rgba(6,182,212,0.2)"/>
</svg>
